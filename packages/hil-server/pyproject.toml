[project]
name = "hil-server"
version = "2.0.0"
description = "HIL Server - Human-in-the-Loop 服务端"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.32.0",
    "websockets>=12.0",
    "pyjwt>=2.8.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
    "python-multipart>=0.0.21",
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.19.0",
    "aiomysql>=0.2.0",
    # fly-pigeon 需要从腾讯内部源安装，参见 [tool.uv] 配置
    "fly-pigeon>=1.0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["hil_server"]

[tool.uv]
extra-index-url = ["http://mirrors.tencent.com/repository/pypi/tencent_pypi/simple"]
