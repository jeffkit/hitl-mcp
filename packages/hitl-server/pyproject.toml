[project]
name = "hitl-server"
version = "2.1.4"
description = "HITL Server - Human-in-the-Loop 服务端（个人端，iLink + WeCom AI）"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.32.0",
    "websockets>=12.0",
    "pyjwt>=2.8.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
    "python-multipart>=0.0.21",
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.19.0",
    "aiomysql>=0.2.0",
    "alembic>=1.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["hitl_server"]

[dependency-groups]
dev = [
    "httpx>=0.27.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]
