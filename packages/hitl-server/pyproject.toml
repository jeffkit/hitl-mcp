[project]
name = "hitl-server"
version = "2.1.3"
description = "HITL Server - Human-in-the-Loop 服务端（个人端，iLink + WeCom AI）"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.32.0",
    "websockets>=12.0",
    "pyjwt>=2.8.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
    "python-multipart>=0.0.21",
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.19.0",
    "aiomysql>=0.2.0",
    "alembic>=1.13.0",
]

# fly-pigeon 为腾讯内网依赖，仅 Direct 模式（旧 HIL service / 飞鸽传书）需要。
# 个人端 hitl-server 只用 iLink + WeCom AI 内置引擎，无需安装；
# 需要 Direct 模式时另装：pip install "hitl-server[direct]"（需内网源）。
[project.optional-dependencies]
direct = ["fly-pigeon>=1.0.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["hitl_server"]

# 仅 uv 在内网开发环境同步 direct 额外依赖时使用；公开构建/发布不依赖此源
[tool.uv]
extra-index-url = ["http://mirrors.tencent.com/repository/pypi/tencent_pypi/simple"]

[dependency-groups]
dev = [
    "httpx>=0.27.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]
