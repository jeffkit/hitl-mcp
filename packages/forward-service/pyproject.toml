[project]
name = "forward-service"
version = "2.0.0"
description = "Forward Service - 企微机器人消息转发服务"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.32.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "python-dotenv>=1.0.0",
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.19.0",
    "fly-pigeon>=1.0.9",
    "aiomysql>=0.3.2",
    "pymysql>=1.1.2",
    "cryptography>=46.0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["forward_service"]

[tool.uv]
extra-index-url = ["http://mirrors.tencent.com/repository/pypi/tencent_pypi/simple"]

[dependency-groups]
dev = [
    "greenlet>=3.3.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]
