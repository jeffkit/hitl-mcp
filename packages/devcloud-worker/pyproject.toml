[project]
name = "devcloud-worker"
version = "1.0.0"
description = "DevCloud Worker - HIL Server 的 Worker 端"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "websockets>=12.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "python-dotenv>=1.0.0",
    "fly-pigeon>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["devcloud_worker"]

[tool.uv]
extra-index-url = ["http://mirrors.tencent.com/repository/pypi/tencent_pypi/simple"]
