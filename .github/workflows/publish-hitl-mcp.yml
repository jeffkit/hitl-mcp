name: Publish hitl-mcp to npm

on:
  push:
    tags:
      - 'hitl-mcp/v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (不实际发布，只构建验证)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp-server-ts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: packages/mcp-server-ts/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Verify CLI
        run: node dist/index.js --help

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/hitl-mcp/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version:     $TAG"
          echo "package.json:    $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "❌ Tag 版本 ($TAG) 与 package.json 版本 ($PKG_VERSION) 不一致，拒绝发布"
            exit 1
          fi
          echo "✅ 版本一致: $PKG_VERSION"

      - name: Publish to npm (dry run)
        if: inputs.dry_run == 'true'
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: inputs.dry_run != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: inputs.dry_run != 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "### ✅ 发布成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**包名**: \`hitl-mcp\`" >> $GITHUB_STEP_SUMMARY
          echo "**版本**: \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npx hitl-mcp --help" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
